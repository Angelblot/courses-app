services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: courses-app:latest
    container_name: courses-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: sqlite:////data/courses.db
      FRONTEND_DIST: /app/frontend/dist
      PLAYWRIGHT_HEADLESS: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DEBUG: ${DEBUG:-false}
    volumes:
      - courses-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  courses-data:
    driver: local
